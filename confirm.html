<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Email Confirmed — Demetra</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --teal: #4ea8a6;
      --lav: #7b6cf6;
      --text: #1a1a2e;
      --sub: #44445a;
      --bg: #f5f5f7;
      --grad: linear-gradient(135deg, var(--teal) 0%, var(--lav) 100%);
      --spring: cubic-bezier(.34,1.56,.64,1);
      --ease: cubic-bezier(.4,0,.2,1);
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 2px 40px rgba(0,0,0,.10);
      padding: 56px 48px 48px;
      max-width: 460px;
      width: 100%;
      text-align: center;
    }
    .icon-wrap {
      width: 72px; height: 72px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 28px;
      animation: pop .6s var(--spring) both;
    }
    .icon-wrap.success { background: linear-gradient(135deg, #4ea8a6, #7b6cf6); }
    .icon-wrap.error   { background: linear-gradient(135deg, #e05252, #c0392b); }
    .icon-wrap svg { width: 36px; height: 36px; stroke: #fff; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    @keyframes pop {
      from { transform: scale(0.5); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(78,168,166,.2);
      border-top-color: var(--teal);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 28px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 26px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.25;
      margin-bottom: 12px;
    }
    p {
      font-size: 15px;
      color: var(--sub);
      line-height: 1.65;
      margin-bottom: 32px;
    }
    .btn {
      display: inline-block;
      background: var(--grad);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      padding: 14px 36px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      transition: opacity .2s, transform .2s var(--spring);
    }
    .btn:hover { opacity: .88; transform: translateY(-1px); }
    .logo {
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--teal);
      margin-bottom: 40px;
      display: block;
    }
  </style>
</head>
<body>
  <div class="card" id="card">
    <span class="logo">Demetra</span>
    <div class="spinner" id="spinner" aria-label="Loading"></div>
    <h1 id="title" style="display:none"></h1>
    <p  id="body"  style="display:none"></p>
    <a  id="cta"   style="display:none" href="/" class="btn">Back to home</a>
  </div>

  <script>
    var SUPABASE_URL  = 'https://zzlkuzslpwozbfdazdqi.supabase.co';
    var SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp6bGt1enNscHdvemJmZGF6ZHFpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDU4NTA1NjgsImV4cCI6MjA2MTQyNjU2OH0.ghRZo1c1eH2fIUKqN-gNe5xBUQjxvkK1g7FfJRwkxHw';
    var sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    var spinner = document.getElementById('spinner');
    var title   = document.getElementById('title');
    var body    = document.getElementById('body');
    var cta     = document.getElementById('cta');

    function show(type, t, b) {
      spinner.style.display = 'none';

      var wrap = document.createElement('div');
      wrap.className = 'icon-wrap ' + type;
      wrap.innerHTML = type === 'success'
        ? '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>'
        : '<svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
      document.getElementById('card').insertBefore(wrap, title);

      title.textContent = t;
      body.textContent  = b;
      title.style.display = '';
      body.style.display  = '';
      cta.style.display   = '';
    }

    (async function() {
      var token = new URLSearchParams(window.location.search).get('token');

      if (!token) {
        show('error', 'Invalid link', 'This confirmation link is missing a token. Please request a new one.');
        return;
      }

      var result = await sb
        .from('waitlist')
        .update({ email_confirmed: true, confirmed_at: new Date().toISOString() })
        .eq('confirmation_token', token)
        .select('id');

      if (result.error || !result.data || result.data.length === 0) {
        show('error', 'Link not found', 'This confirmation link is invalid or has already been used. If you think this is a mistake, please rejoin the waitlist.');
        return;
      }

      show('success', 'You\'re confirmed!', 'Your spot on the Demetra waitlist is locked in. We\'ll be in touch when we launch.');
    })();
  </script>
</body>
</html>
